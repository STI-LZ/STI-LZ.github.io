<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 基础信息 -->
    <meta charset="utf-8">
    <title>STI-LZ</title>
    <link rel="icon" href="./img/favicon.png">
    <!-- 引入 -->
    <script type="text/javascript" src="./js/jquery.min.js"></script>
    <script type="text/javascript" src="./js/izitoast.min.js"></script>
    <link rel="stylesheet" type="text/css" href="./css/style.css">
    <link rel="stylesheet" type="text/css" href="./css/Bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="./css/iziToast.min.css">
</head>
<body>
    <section id="section" class="section">
        <div class="bg-all">
            <img id="bg" onerror="this.classList.add('error');"></img>

        </div>
        <main id="main" class="main">
            <div class="left">
                <div class="main-img">
                    <img id="logo-img" src="./img/favicon.png" alt="img">
                    <span class="img-title">STI-LZ</span>
                </div>
                <div class="message cards">
                    <div class="des" id="des">
                        <img src="./img/quotes.png" alt="quotes" width="20px" height="20px">
                        <div class="des-title">
                            <span style="font-size: larger;font-weight: bolder;">路中科学技术研究所</span>
                            <span style="font-weight: bold;">（STI-LZ）</span>
                            其创立的目的是为了招揽路中的高技术人才，共同促进路中的科技楼发展
                        </div>
                        <img src="./img/quotes.png" alt="quotes" width="20px" height="20px">
                    </div>
                </div>
            </div>
        </main>
        <footer id="footer" class="fixed-bottom footer">
            <span class="power">Copyright &copy; 2023 STI-LZ & Made by ERA-YES</a></span>
        </footer>
    </section>
    <script type="text/javascript" src="./js/main.js"></script>
